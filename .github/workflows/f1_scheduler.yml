name: F1 Race Scheduler

on:
    schedule:
        - cron: '*/5 * * * *'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    check-and-ingest:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install azure-storage-blob azure-identity azure-mgmt-resource

            - name: Azure login
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Run F1 Scheduler ETL
              run: |
                  python scripts/f1_scheduler.py

            - name: Flatten and summarize race data
              run: |
                  for blob in $(az storage blob list \
                      --account-name stmeathclouddev \
                      --container-name raw-data \
                      --prefix "f1/" \
                      --auth-mode login \
                      --query "[].name" -o tsv); do
                      race=$(echo $blob | cut -d'/' -f2)
                      az storage blob download \
                      --account-name stmeathclouddev \
                      --container-name raw-data \
                      --name "$blob" \
                      --file "/tmp/${race}.json" \
                      --auth-mode login
                      python scripts/f1_flatten.py "/tmp/${race}.json"
                  done

            - name: Commit summary JSON
              run: |
                  git config user.name "github-actions"
                  git config user.email "actions@github.com"
                  git add static/f1/
                  git diff --staged --quiet || git commit -m "Auto: update F1 race summaries"
                  git push